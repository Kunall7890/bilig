name: Bilig WorkPaper MCP
version: 0.0.1
schema: v1
mcpServers:
  - name: Bilig WorkPaper File
    type: stdio
    command: npm
    args:
      - "exec"
      - "--yes"
      - "--package"
      - "@bilig/workpaper@latest"
      - "--"
      - "bilig-workpaper-mcp"
      - "--workpaper"
      - "__WORKPAPER_PATH__"
      - "--init-demo-workpaper"
      - "--writable"
