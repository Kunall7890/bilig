name: XLSX Cache Doctor
description: Diagnose stale cached XLSX formula values in CI without Excel, LibreOffice, or browser automation.
author: proompteng

inputs:
  workbook:
    description: Path to one XLSX workbook to inspect. Use workbooks for repo-scale scans.
    required: false
    default: ''
  workbooks:
    description: Glob, comma list, or newline list of XLSX workbooks to inspect.
    required: false
    default: ''
  changed-files-only:
    description: Only inspect matched XLSX files changed in the pull request or current diff.
    required: false
    default: 'false'
  package-version:
    description: npm version or dist-tag for @bilig/xlsx-formula-recalc. Pin this for production workflows.
    required: false
    default: '0.158.0'
  inspect-limit:
    description: Formula cells to recompute during inspection. Use "all" or a positive integer.
    required: false
    default: 'all'
  json-output:
    description: Optional path for the JSON report. Defaults to the runner temp directory.
    required: false
    default: ''
  markdown-output:
    description: Optional path for the Markdown report. Defaults to the runner temp directory.
    required: false
    default: ''
  fail-on-stale:
    description: Fail the workflow when stale cached formula values are detected.
    required: false
    default: 'false'

outputs:
  json:
    description: Path to the xlsx-cache-doctor JSON report.
    value: ${{ steps.inspect.outputs.json }}
  markdown:
    description: Path to the xlsx-cache-doctor Markdown report.
    value: ${{ steps.inspect.outputs.markdown }}
  workbook-count:
    description: Number of XLSX workbooks inspected.
    value: ${{ steps.inspect.outputs.workbook-count }}
  formula-count:
    description: Number of formula cells found across inspected workbooks.
    value: ${{ steps.inspect.outputs.formula-count }}
  stale-count:
    description: Number of inspected formula cells with stale cached values across inspected workbooks.
    value: ${{ steps.inspect.outputs.stale-count }}
  fresh-count:
    description: Number of inspected formula cells whose cached values match recalculated values.
    value: ${{ steps.inspect.outputs.fresh-count }}
  missing-cache-count:
    description: Number of inspected formula cells that did not store a cached value in the workbook.
    value: ${{ steps.inspect.outputs.missing-cache-count }}
  unsupported-recalculation-count:
    description: Number of inspected formula cells without a comparable recalculated value.
    value: ${{ steps.inspect.outputs.unsupported-recalculation-count }}
  uninspected-count:
    description: Number of formula cells skipped because inspect-limit was lower than formula-count across inspected workbooks.
    value: ${{ steps.inspect.outputs.uninspected-count }}
  suggested-reads:
    description: Comma-separated workbook-qualified formula cells to read in a recalculation proof, capped at 25. The JSON report keeps the full list.
    value: ${{ steps.inspect.outputs.suggested-reads }}

runs:
  using: composite
  steps:
    - name: Validate Node.js runtime
      shell: bash
      run: |
        set -euo pipefail
        node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) { console.error('XLSX Cache Doctor requires Node.js 22+. Add actions/setup-node before proompteng/bilig.'); process.exit(1); }"

    - id: resolve
      name: Resolve XLSX workbooks
      shell: bash
      env:
        BILIG_WORKBOOK: ${{ inputs.workbook }}
        BILIG_WORKBOOKS: ${{ inputs.workbooks }}
        BILIG_CHANGED_FILES_ONLY: ${{ inputs.changed-files-only }}
      run: |
        set -euo pipefail
        script="$GITHUB_ACTION_PATH/resolve-workbooks.mjs"
        if [[ ! -f "$script" ]]; then
          script="$GITHUB_ACTION_PATH/actions/xlsx-cache-doctor/resolve-workbooks.mjs"
        fi
        node "$script"

    - id: package
      name: Install XLSX Cache Doctor package
      if: ${{ steps.resolve.outputs.workbook-count != '0' }}
      shell: bash
      env:
        BILIG_PACKAGE_VERSION: ${{ inputs.package-version }}
      run: |
        set -euo pipefail
        package_dir="${RUNNER_TEMP:-$PWD/.tmp}/bilig-xlsx-cache-doctor-package"
        rm -rf "$package_dir"
        mkdir -p "$package_dir"
        npm install --prefix "$package_dir" --omit=dev --no-audit --no-fund "@bilig/xlsx-formula-recalc@${BILIG_PACKAGE_VERSION}"
        package_root="$package_dir/node_modules/@bilig/xlsx-formula-recalc"
        test -f "$package_root/dist/index.js"
        echo "package-root=$package_root" >> "$GITHUB_OUTPUT"

    - id: inspect
      name: Inspect XLSX formula caches
      shell: bash
      env:
        BILIG_WORKBOOKS_JSON: ${{ steps.resolve.outputs.workbooks-json }}
        BILIG_PACKAGE_ROOT: ${{ steps.package.outputs.package-root }}
        BILIG_CHANGED_FILES_ONLY: ${{ inputs.changed-files-only }}
        BILIG_PACKAGE_VERSION: ${{ inputs.package-version }}
        BILIG_INSPECT_LIMIT: ${{ inputs.inspect-limit }}
        BILIG_JSON_OUTPUT: ${{ inputs.json-output }}
        BILIG_MARKDOWN_OUTPUT: ${{ inputs.markdown-output }}
        BILIG_FAIL_ON_STALE: ${{ inputs.fail-on-stale }}
      run: |
        set -euo pipefail
        script="$GITHUB_ACTION_PATH/inspect-workbooks.mjs"
        if [[ ! -f "$script" ]]; then
          script="$GITHUB_ACTION_PATH/actions/xlsx-cache-doctor/inspect-workbooks.mjs"
        fi
        node "$script"

branding:
  icon: file-text
  color: green
