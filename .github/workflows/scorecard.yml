name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '26 11 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish-scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Publish OpenSSF Scorecard result
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true
