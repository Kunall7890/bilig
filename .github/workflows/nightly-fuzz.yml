name: github-nightly-correctness

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-correctness:
    name: nightly-correctness
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '2.5'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for deep correctness gate
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Run deep correctness gate
        run: |
          set -eu
          pnpm test:correctness:deep

      - name: Upload nightly correctness artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bilig-nightly-correctness-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore
